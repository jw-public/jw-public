apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo
spec:
  template:
    spec:
      containers:
        - name: mongo
          volumeMounts:
            - name: mongo
              mountPath: /data/db
      volumes:
        - name: mongo
          persistentVolumeClaim:
            # mongo:7 boots on the fresh "mongo7" volume (the old "mongo" PVC
            # with 3.6 data files would crash-loop mongo:7). Restore the dump
            # into it before the app is scaled back up — see the runbook.
            claimName: mongo7
