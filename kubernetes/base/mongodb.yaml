apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo
spec:
  selector:
    matchLabels:
      app: mongo
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
        - name: mongo
          # Upgraded 3.4/3.6 -> 7: the modernized app's MongoDB driver
          # (npm-mongo 6) requires a server >= 4.0. mongo:7 CANNOT read the old
          # 3.6 data files in place, so production migrates by dump & restore
          # into a fresh volume — see docs/migration/PROD_MONGO_UPGRADE.md.
          image: mongo:7
          resources:
            limits:
              memory: "1024Mi"
              cpu: "1000m"
          ports:
            - containerPort: 27017
---
apiVersion: v1
kind: Service
metadata:
  name: mongo
spec:
  selector:
    app: mongo
  ports:
    - port: 27017
      targetPort: 27017
