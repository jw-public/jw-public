apiVersion: apps/v1
kind: Deployment
metadata:
  name: jw-public
spec:
  selector:
    matchLabels:
      app: jw-public
  template:
    metadata:
      labels:
        app: jw-public
    spec:
      containers:
        - name: jw-public
          image: icereed/jw-public:latest
          resources:
            requests:
              memory: "800Mi"
              cpu: "500m"
            limits:
              memory: "800Mi"
              cpu: "500m"
          ports:
            - containerPort: 8080
          env:
            - name: MONGO_URL
              # ?tls=false: against mongo:7 the bundled driver otherwise opens
              # its monitoring connections with TLS to this plain MongoDB,
              # flooding the mongo log with SSLHandshakeFailed (app works either
              # way). Matches docker-compose.yaml.
              value: mongodb://mongo/jwpublic?tls=false
            - name: ROOT_URL
              value: http://localhost:8080
          readinessProbe:
            httpGet:
              path: /status
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 3
            timeoutSeconds: 1
          livenessProbe:
            httpGet:
              path: /status
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 3
            timeoutSeconds: 3
